services:
  db:
    image: postgres:17
    container_name: condensr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: condensr
      POSTGRES_PASSWORD: condensr
      POSTGRES_DB: condensr
    ports:
      - "5432:5432"
    volumes:
      - condensr_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U condensr"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: condensr-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://condensr:condensr@db:5432/condensr
      BASE_URL: http://localhost:8080
      RUST_LOG: condensr_api=info,info
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: apps/desktop
      dockerfile: Dockerfile
    container_name: condensr-web
    restart: unless-stopped
    ports:
      - "1420:80"
    depends_on:
      - api

volumes:
  condensr_pgdata:
